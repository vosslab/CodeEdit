disabled_rules:
  - todo
  - trailing_comma
  - nesting

type_name:
  excluded:
    - ID

identifier_name:
  allowed_symbols: ["$", "_"]
  excluded:
    - id
    - vc
    - lf # LineEndingStyle case name (PlainEditorTextCleaner.swift, PlainEditorSettingsKeys.swift); crlf is 4 chars and already passes the default min_length

# paths to ignore during linting.
excluded:
  - CodeEditModules/.build # Where Swift Package Manager checks out dependency sources
  - DerivedData
  - .build # SwiftPM build products for this package
  - Packages/*/.build # SwiftPM build products for local packages
  - OTHER_REPOS # gitignored reference checkouts, not this repo's source (see .gitignore)
  - .tmp # gitignored macro-expansion build artifacts (see .gitignore)

opt_in_rules:
  - attributes
  - empty_count
  - closure_spacing
  - contains_over_first_not_nil
  - missing_docs
#  - implicit_return
  - modifier_order
  - convenience_type
  - pattern_matching_keywords
  - multiline_parameters_brackets
  - multiline_arguments_brackets

custom_rules:
  spaces_over_tabs:
    included: ".*\\.swift"
    name: "Spaces over Tabs"
    regex: "\t"
    message: "Prefer spaces for indents over tabs. See Xcode setting: 'Text Editing' -> 'Indentation'"
    severity: warning
